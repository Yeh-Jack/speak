services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DEFAULT_MODEL=Qwen3.5-2B-Q4_K_M.gguf
      - LLM_GPU_LAYERS=${LLM_GPU_LAYERS:--1}
      - LLM_CONTEXT_SIZE=8192
      - YOUTUBE_DOWNLOAD_QUALITY=720
      - YOUTUBE_AUDIO_QUALITY=128k
      - CHUNK_DURATION=300
    volumes:
      - app_data:/app/data
    ports:
      - "8080:8080"
    command: >
      sh -c "mkdir -p /app/data/{audios,courses,db,models,transcripts,videos} &&
      uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  app_data:
